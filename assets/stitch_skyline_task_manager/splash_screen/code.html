<style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #f9f9fd;
        }

        .splash-gradient {
            background: linear-gradient(180deg, #FFFFFF 0%, #DCEEFF 100%);
        }

        .logo-container {
            animation: fadeInScale 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes fadeInScale {
            0% {
                opacity: 0;
                transform: scale(0.8) translateY(10px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .loading-bar-container {
            width: 140px;
            height: 4px;
            background: rgba(0, 96, 169, 0.1);
            border-radius: 99px;
            overflow: hidden;
        }

        .loading-bar-progress {
            width: 0%;
            height: 100%;
            background: #4DA3FF;
            border-radius: 99px;
            animation: progress 2.5s cubic-bezier(0.65, 0, 0.35, 1) forwards;
        }

        @keyframes progress {
            0% { width: 0%; }
            30% { width: 25%; }
            60% { width: 70%; }
            100% { width: 100%; }
        }

        .soft-float {
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="antialiased selection:bg-primary-container selection:text-on-primary-container">

<div class="absolute top-[-10%] right-[-10%] w-80 h-80 bg-primary-container/10 rounded-full blur-[80px]"></div>
<div class="absolute bottom-[-5%] left-[-10%] w-64 h-64 bg-secondary-container/20 rounded-full blur-[60px]"></div>

<!-- Tagline -->
<p class="font-label-md text-label-md text-on-surface-variant uppercase tracking-[0.2em] opacity-80">

</div>
<!-- Loading Indicator -->
<div class="absolute bottom-24 flex flex-col items-center gap-sm">
