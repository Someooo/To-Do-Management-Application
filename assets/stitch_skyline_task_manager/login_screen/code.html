<style>

            content: '';

            bottom: 0;

            width: 0;
            height: 2px;
            background-color: #0060a9;
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }
        .input-container:focus-within .input-focus-line::after {

<body class="min-h-screen flex flex-col items-center justify-start overflow-x-hidden">

</div>

<!-- Main Content Canvas -->
<main class="w-full px-margin-mobile flex flex-col animate-in fade-in slide-in-from-bottom-4 duration-700">
<!-- Welcome Message -->
<header class="mb-xl text-center">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface tracking-tight">
                Welcome back
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs">
                Log in to stay on top of your flow.
            </p>
</header>
<!-- Login Form -->
<form class="flex flex-col gap-lg" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div class="flex flex-col gap-base relative input-container group">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="email">Email Address</label>
<div class="relative flex items-center bg-surface-container-low rounded-t-lg transition-all duration-200">
<span class="material-symbols-outlined absolute left-4 text-on-surface-variant">mail</span>
<input class="w-full bg-transparent border-none focus:ring-0 pl-12 pr-4 py-4 font-body-md text-body-md text-on-surface placeholder:text-outline-variant" id="email" placeholder="name@company.com" type="email"/>
<div class="input-focus-line"></div>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-base relative input-container group">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="password">Password</label>
<div class="relative flex items-center bg-surface-container-low rounded-t-lg transition-all duration-200">
<span class="material-symbols-outlined absolute left-4 text-on-surface-variant">lock</span>
<input class="w-full bg-transparent border-none focus:ring-0 pl-12 pr-12 py-4 font-body-md text-body-md text-on-surface placeholder:text-outline-variant" id="password" placeholder="••••••••" type="password"/>
<button aria-label="Toggle password visibility" class="absolute right-4 text-on-surface-variant flex items-center justify-center w-8 h-8 rounded-full hover:bg-surface-variant/50 transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
<div class="input-focus-line"></div>
</div>
</div>
<!-- Forgot Password -->
<div class="flex justify-end">
<a class="font-label-md text-label-md text-primary hover:underline transition-all" href="#">
                    Forgot password?
                </a>
</div>
<!-- Login Button -->
<button class="mt-md bg-primary-container text-on-primary font-title-md text-title-md py-4 rounded-[16px] shadow-sm active:scale-[0.98] transition-all duration-200 hover:brightness-105 flex items-center justify-center gap-2" type="submit">
                Log in
                <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<!-- Alternative Login -->
<div class="mt-xl flex flex-col items-center gap-lg">

<!-- Navigation Shell (Suppressed as per rules for Transactional screen) -->
<script>
        // Micro-interaction for password visibility
        const togglePassword = document.querySelector('button[aria-label="Toggle password visibility"]');
        const passwordInput = document.querySelector('#password');
        
        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            const icon = togglePassword.querySelector('.material-symbols-outlined');
            icon.textContent = type === 'password' ? 'visibility' : 'visibility_off';
        });

        // Simple touch feedback logic
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('touchstart', () => {
                btn.style.opacity = '0.8';
            });
            btn.addEventListener('touchend', () => {
                btn.style.opacity = '1';
            });
        });
    </script>
