<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Focus - Home Loading</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        
        .skeleton-shimmer {
            background: linear-gradient(90deg, 
                #f3f3f7 25%, 
                #e8e8ec 37%, 
                #f3f3f7 63%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
        }

        .dark .skeleton-shimmer {
            background: linear-gradient(90deg, 
                #2f3034 25%, 
                #404752 37%, 
                #2f3034 63%);
            background-size: 200% 100%;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<script id="tailwind-config">

          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "surface-variant": "#e2e2e6",
                      "on-surface-variant": "#404752",

                      "primary-container": "#4da3ff",
                      "on-tertiary": "#ffffff",
                      "background": "#f9f9fd",
                      "secondary-fixed-dim": "#b7c9d9",
                      "outline": "#717783",
                      "on-secondary-fixed-variant": "#384956",
                      "tertiary-fixed-dim": "#c3c7cc",
                      "inverse-on-surface": "#f0f0f4",
                      "on-primary-container": "#003866",
                      "primary-fixed-dim": "#a2c9ff",
                      "on-error-container": "#93000a",
                      "outline-variant": "#c0c7d4",
                      "surface": "#f9f9fd",
                      "surface-tint": "#0060a9",
                      "surface-dim": "#d9dade",
                      "surface-bright": "#f9f9fd",
                      "surface-container-high": "#e8e8ec",

              "borderRadius": {
                      "DEFAULT": "0.25rem",

              "spacing": {
                      "sm": "12px",

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-background min-h-screen font-body-md select-none">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-margin-mobile h-16 w-full bg-background dark:bg-background">
<div class="flex items-center gap-sm">
<div class="w-10 h-10 rounded-full skeleton-shimmer"></div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary dark:text-primary-fixed-dim">Focus</h1>
</div>
<div class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-surface-container-high transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-primary">search</span>
</div>
</header>
<main class="pt-20 pb-24 px-margin-mobile max-w-md mx-auto">
<!-- Greetings Area -->
<section class="mb-xl">
<div class="h-8 w-48 skeleton-shimmer rounded-lg mb-xs"></div>
<div class="h-5 w-64 skeleton-shimmer rounded-lg opacity-60"></div>
</section>
<!-- Bento Highlights Section -->
<section class="grid grid-cols-2 gap-md mb-xl">
<div class="col-span-2 h-40 skeleton-shimmer rounded-xl shadow-sm"></div>
<div class="h-32 skeleton-shimmer rounded-xl shadow-sm"></div>
<div class="h-32 skeleton-shimmer rounded-xl shadow-sm"></div>
</section>
<!-- Category Horizontal List -->
<section class="mb-lg -mx-margin-mobile px-margin-mobile overflow-x-auto no-scrollbar flex gap-sm">
<div class="flex-shrink-0 w-24 h-10 skeleton-shimmer rounded-full"></div>
<div class="flex-shrink-0 w-24 h-10 skeleton-shimmer rounded-full"></div>
<div class="flex-shrink-0 w-24 h-10 skeleton-shimmer rounded-full"></div>
<div class="flex-shrink-0 w-24 h-10 skeleton-shimmer rounded-full"></div>
</section>
<!-- Tasks List (The Skeleton State) -->
<section class="space-y-md">
<div class="flex items-center justify-between mb-sm">
<div class="h-6 w-32 skeleton-shimmer rounded-md"></div>
<div class="h-4 w-16 skeleton-shimmer rounded-md"></div>
</div>
<!-- Task Card 1 -->
<div class="bg-surface p-md rounded-xl flex gap-md items-start">
<div class="w-6 h-6 rounded-full border-2 border-outline-variant flex-shrink-0"></div>
<div class="flex-1 space-y-xs">

</div>
</div>
</div>
<!-- Task Card 2 -->
<div class="bg-surface p-md rounded-xl flex gap-md items-start">
<div class="w-6 h-6 rounded-full border-2 border-outline-variant flex-shrink-0"></div>
<div class="flex-1 space-y-xs">
<div class="h-5 w-1/2 skeleton-shimmer rounded-md"></div>
<div class="h-4 w-5/6 skeleton-shimmer rounded-md"></div>
<div class="flex gap-xs mt-sm">
<div class="h-6 w-24 skeleton-shimmer rounded-full"></div>
</div>
</div>
</div>
<!-- Task Card 3 -->
<div class="bg-surface p-md rounded-xl flex gap-md items-start">
<div class="w-6 h-6 rounded-full border-2 border-outline-variant flex-shrink-0"></div>
<div class="flex-1 space-y-xs">
<div class="h-5 w-2/3 skeleton-shimmer rounded-md"></div>
<div class="h-4 w-full skeleton-shimmer rounded-md"></div>
<div class="flex gap-xs mt-sm">
<div class="h-6 w-12 skeleton-shimmer rounded-full"></div>
<div class="h-6 w-16 skeleton-shimmer rounded-full"></div>
</div>
</div>
</div>
<!-- Task Card 4 -->
<div class="bg-surface p-md rounded-xl flex gap-md items-start">
<div class="w-6 h-6 rounded-full border-2 border-outline-variant flex-shrink-0"></div>
<div class="flex-1 space-y-xs">
<div class="h-5 w-3/4 skeleton-shimmer rounded-md"></div>
<div class="h-4 w-4/5 skeleton-shimmer rounded-md"></div>
</div>
</div>
</section>
</main>
<!-- FAB -->
<button class="fixed right-6 bottom-24 w-[56px] h-[56px] rounded-full bg-primary-container text-white shadow-lg flex items-center justify-center active:scale-90 transition-transform z-50">
<span class="material-symbols-outlined text-[24px]">add</span>
</button>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 py-3 bg-surface dark:bg-surface-dim shadow-[0px_-4px_12px_rgba(0,0,0,0.05)] z-50 rounded-t-xl">
<button class="flex flex-col items-center justify-center bg-secondary-container dark:bg-on-secondary-fixed-variant text-on-secondary-container dark:text-secondary-fixed rounded-full px-5 py-1 active:scale-90 transition-transform">
<span class="material-symbols-outlined">task_alt</span>
<span class="font-label-md text-label-md">Tasks</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline p-2 hover:bg-surface-variant/50 active:scale-90 transition-transform">
<span class="material-symbols-outlined">calendar_today</span>
<span class="font-label-md text-label-md">Calendar</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline p-2 hover:bg-surface-variant/50 active:scale-90 transition-transform">
<span class="material-symbols-outlined">timer</span>
<span class="font-label-md text-label-md">Focus</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline p-2 hover:bg-surface-variant/50 active:scale-90 transition-transform">
<span class="material-symbols-outlined">settings</span>
<span class="font-label-md text-label-md">Settings</span>
</button>
</nav>
<script>
        // Simple micro-interaction for skeleton cards
        document.querySelectorAll('.bg-surface').forEach(card => {
            card.addEventListener('click', () => {
                card.classList.add('scale-95', 'opacity-80');
                setTimeout(() => {
                    card.classList.remove('scale-95', 'opacity-80');
                }, 150);
            });
        });

        // Theme toggle logic if needed (mocked for demo)
        const isDarkMode = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        if(isDarkMode) {
            document.documentElement.classList.add('dark');
        }
    </script>
</body></html>
