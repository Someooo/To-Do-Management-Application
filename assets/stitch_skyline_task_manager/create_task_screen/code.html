<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create Task - Focus</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        /* Custom Checkbox and Radio logic for priority selection */
        .priority-chip:checked + label {
            background-color: #4da3ff;
            color: white;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "surface-variant": "#e2e2e6",
                      "on-surface-variant": "#404752",
                      "tertiary-container": "#9ca0a5",
                      "secondary-fixed": "#d3e5f6",
                      "on-secondary-container": "#556675",
                      "error-container": "#ffdad6",
                      "on-primary": "#ffffff",
                      "surface-container-low": "#f3f3f7",
                      "on-tertiary-fixed-variant": "#43474b",
                      "secondary-container": "#d3e5f6",
                      "primary-fixed": "#d3e4ff",
                      "on-primary-fixed": "#001c38",
                      "on-tertiary-fixed": "#181c20",
                      "inverse-primary": "#a2c9ff",
                      "tertiary-fixed": "#dfe3e8",
                      "primary-container": "#4da3ff",
                      "on-tertiary": "#ffffff",
                      "background": "#f9f9fd",
                      "secondary-fixed-dim": "#b7c9d9",
                      "outline": "#717783",
                      "on-secondary-fixed-variant": "#384956",
                      "tertiary-fixed-dim": "#c3c7cc",
                      "inverse-on-surface": "#f0f0f4",
                      "on-primary-container": "#003866",
                      "primary-fixed-dim": "#a2c9ff",
                      "on-error-container": "#93000a",
                      "outline-variant": "#c0c7d4",
                      "surface": "#f9f9fd",
                      "surface-tint": "#0060a9",
                      "surface-dim": "#d9dade",
                      "surface-bright": "#f9f9fd",
                      "surface-container-high": "#e8e8ec",
                      "surface-container-lowest": "#ffffff",
                      "error": "#ba1a1a",
                      "on-primary-fixed-variant": "#004881",
                      "secondary": "#4f606e",
                      "on-surface": "#1a1c1f",
                      "on-secondary-fixed": "#0c1d29",
                      "tertiary": "#5b5f63",
                      "on-error": "#ffffff",
                      "primary": "#0060a9",
                      "on-secondary": "#ffffff",
                      "surface-container-highest": "#e2e2e6",
                      "on-tertiary-container": "#33373b",
                      "surface-container": "#eeedf2",
                      "on-background": "#1a1c1f",
                      "inverse-surface": "#2f3034"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "sm": "12px",
                      "xs": "8px",
                      "margin-mobile": "20px",
                      "gutter": "16px",
                      "md": "16px",
                      "lg": "24px",
                      "xl": "32px",
                      "base": "4px"
              },
              "fontFamily": {
                      "headline-lg-mobile": ["Inter"],
                      "body-md": ["Inter"],
                      "title-md": ["Inter"],
                      "label-md": ["Inter"],
                      "headline-lg": ["Inter"],
                      "display-lg": ["Inter"],
                      "body-sm": ["Inter"]
              },
              "fontSize": {
                      "headline-lg-mobile": ["28px", {"lineHeight": "36px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                      "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                      "title-md": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                      "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                      "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                      "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}]
              }
            },
          },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- TopAppBar Structure from JSON -->
<header class="fixed top-0 w-full z-50 bg-background flex items-center justify-between px-margin-mobile h-16 w-full">
<div class="flex items-center gap-sm">
<button class="active:scale-95 duration-200 p-2 -ml-2 text-on-surface-variant hover:bg-surface-container-high transition-colors rounded-full" onclick="window.history.back()">
<span class="material-symbols-outlined">close</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary">New Task</h1>
</div>
<div class="flex items-center gap-sm">
<button class="material-symbols-outlined text-primary active:scale-95 duration-200 p-2 hover:bg-surface-container-high transition-colors rounded-full">more_vert</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 mt-16 pb-32 px-margin-mobile py-lg overflow-y-auto">
<div class="max-w-md mx-auto space-y-xl">
<!-- Title Section -->
<section class="space-y-sm">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider" for="task-title">Task Name</label>
<input class="w-full bg-surface-container-lowest border-b-2 border-outline-variant focus:border-primary-container focus:ring-0 text-title-md font-title-md py-4 transition-all duration-300 placeholder:text-outline/50" id="task-title" placeholder="What needs to be done?" type="text"/>
</section>
<!-- Description Section -->
<section class="space-y-sm">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider" for="task-desc">Description</label>
<div class="bg-surface-container-lowest rounded-xl p-md shadow-sm">
<textarea class="w-full bg-transparent border-none focus:ring-0 text-body-md font-body-md resize-none placeholder:text-outline/50" id="task-desc" placeholder="Add notes, context, or links here..." rows="4"></textarea>
</div>
</section>
<!-- Horizontal Meta Selectors -->
<div class="grid grid-cols-2 gap-gutter">
<!-- Date Picker Section -->
<section class="space-y-sm">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Due Date</label>
<div class="relative group">
<input class="w-full bg-surface-container-lowest rounded-xl p-md border-none shadow-sm text-body-md font-body-md focus:ring-2 focus:ring-primary-container transition-all" id="task-date" type="date"/>
<div class="absolute inset-y-0 right-3 flex items-center pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined">calendar_today</span>
</div>
</div>
</section>
<!-- Status Dropdown -->
<section class="space-y-sm">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Status</label>
<div class="relative group">
<select class="w-full bg-surface-container-lowest rounded-xl p-md border-none shadow-sm text-body-md font-body-md focus:ring-2 focus:ring-primary-container appearance-none transition-all" id="task-status">
<option value="todo">To Do</option>
<option value="in-progress">In Progress</option>
<option value="review">In Review</option>
</select>
<div class="absolute inset-y-0 right-3 flex items-center pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</section>
</div>
<!-- Priority Selection (Bento-style Radio Group) -->
<section class="space-y-sm">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Priority Level</label>
<div class="flex gap-sm">
<div class="flex-1">
<input checked="" class="hidden priority-chip" id="p-low" name="priority" type="radio"/>
<label class="flex flex-col items-center justify-center p-md bg-surface-container-lowest rounded-xl shadow-sm cursor-pointer transition-all active:scale-95 font-label-md text-label-md" for="p-low">
<span class="material-symbols-outlined text-tertiary mb-1">arrow_downward</span>
                            Low
                        </label>
</div>
<div class="flex-1">
<input class="hidden priority-chip" id="p-med" name="priority" type="radio"/>
<label class="flex flex-col items-center justify-center p-md bg-surface-container-lowest rounded-xl shadow-sm cursor-pointer transition-all active:scale-95 font-label-md text-label-md" for="p-med">
<span class="material-symbols-outlined text-primary mb-1">remove</span>
                            Medium
                        </label>
</div>
<div class="flex-1">
<input class="hidden priority-chip" id="p-high" name="priority" type="radio"/>
<label class="flex flex-col items-center justify-center p-md bg-surface-container-lowest rounded-xl shadow-sm cursor-pointer transition-all active:scale-95 font-label-md text-label-md" for="p-high">
<span class="material-symbols-outlined text-error mb-1">priority_high</span>
                            High
                        </label>
</div>
</div>
</section>
<!-- Attachment / Context Visual -->
<section class="space-y-sm">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Reference</label>
<div class="relative w-full aspect-video rounded-xl overflow-hidden shadow-sm group">
<img class="w-full h-full object-cover" data-alt="A clean, minimalist high-key workspace top-down view showing a focused productivity environment with a sleek laptop and a notebook. The lighting is soft and even, highlighting premium textures in a palette of whites and soft blues. The image conveys a professional and calm atmosphere essential for deep focus work sessions." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCY7ucGSQMRcUD25OaSNdrHmbEFobdF8VnaeLu8hV2rpbduuzXCfvDlgn9me9aXjGbfzpASujyoIz35s3tBxTnX3NH-pYPmm8AM-22Ht2ijbOwVgVyp1KLE9RhFcFXrjgHz06G8IZkfQWOmCs7klAawQIo8HFq-vZjL_mu7ZQZtfLVIYBQmfMX9K7I6Aar4l5sTHDE2PrXtiacpJb4v3rY-cawpknA-36OU-h4p4x6obk7N8AO4ENCYoSK1QOlSllVmpCaKLNeagsJT"/>
<div class="absolute inset-0 bg-black/20 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
<button class="bg-white/90 px-lg py-sm rounded-full font-label-md text-label-md text-primary flex items-center gap-xs">
<span class="material-symbols-outlined text-sm">add_photo_alternate</span>
                            Change Image
                        </button>
</div>
</div>
</section>
</div>
</main>
<!-- Footer Action -->
<footer class="fixed bottom-0 left-0 w-full p-margin-mobile bg-surface-bright/80 backdrop-blur-md z-50">
<button class="w-full h-14 bg-primary-container text-on-primary-container font-title-md text-title-md rounded-xl shadow-lg hover:shadow-xl active:scale-[0.98] transition-all flex items-center justify-center gap-sm" id="save-task">
<span class="material-symbols-outlined">check_circle</span>
            Save Task
        </button>
</footer>
<!-- Feedback Interaction Script -->
<script>
        document.getElementById('save-task').addEventListener('click', function() {
            const btn = this;
            const originalContent = btn.innerHTML;
            
            // Visual feedback animation
            btn.innerHTML = `
                <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Saving...
            `;
            btn.classList.add('opacity-80', 'pointer-events-none');

            setTimeout(() => {
                btn.classList.remove('bg-primary-container');
                btn.classList.add('bg-green-500');
                btn.innerHTML = `
                    <span class="material-symbols-outlined">done</span>
                    Success
                `;
                
                setTimeout(() => {
                    // In a real app, this would route back or close the modal
                    btn.innerHTML = originalContent;
                    btn.classList.remove('bg-green-500', 'opacity-80', 'pointer-events-none');
                    btn.classList.add('bg-primary-container');
                }, 1000);
            }, 800);
        });

        // Simple placeholder for date picker to show today
        const dateInput = document.getElementById('task-date');
        const today = new Date().toISOString().split('T')[0];
        dateInput.value = today;
    </script>
</body></html>
