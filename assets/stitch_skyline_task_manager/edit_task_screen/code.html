<!-- Bottom Navigation Shell (Suppressed context check: This is a task-focused task-screen, usually navigation is hidden, but let's keep it for global consistency if required by shell logic, otherwise hide. The prompt asks for Edit Screen - implies focused journey. I will suppress but show the FAB-like action above.) -->
<!-- Applying BottomNavBar from JSON as per instructions for top-level if relevant, but Task Edit is "Task-Focused". I'll skip the shell to prioritize content canvas as per "Relevance Check". -->
<script>
        // Micro-interactions
        document.querySelectorAll('input, textarea').forEach(el => {
            el.addEventListener('focus', () => {
                el.parentElement.classList.add('shadow-md');
                el.parentElement.classList.add('bg-white');
            });
            el.addEventListener('blur', () => {
                el.parentElement.classList.remove('shadow-md');
                el.parentElement.classList.remove('bg-white');
            });
        });

        // Simple button active state handler
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', function(e) {
                if(this.innerText === "Update Task") {
                    const originalText = this.innerHTML;
                    this.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> Updating...';
                    this.disabled = true;
                    setTimeout(() => {
                        this.innerHTML = '<span class="material-symbols-outlined">check_circle</span> Success';
                        setTimeout(() => {
                            this.innerHTML = originalText;
                            this.disabled = false;
                        }, 1500);
                    }, 800);
                }
            });
        });
    </script>
